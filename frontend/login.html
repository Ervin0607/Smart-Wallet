<!DOCTYPE html>
<html>
<head>
    <title>SmartWallet - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

    <div class="auth-card">
        <h1>SmartWallet Login</h1>
        <input id="email" type="email" class="form-control" placeholder="Email Address">
        <input id="password" type="password" class="form-control" placeholder="Password">
        
        <button id="loginBtn" class="btn"><b>Login</b></button>
        <p id="error" style="color: #ff4c4c; margin-top: 15px; font-size: 0.9em;"></p>
        
        <a href="register.html" class="auth-link">Don't have an account? Register here.</a>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
